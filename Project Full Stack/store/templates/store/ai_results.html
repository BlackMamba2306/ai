{% extends 'store/main.html' %}
{% block content %}
<div class="row">
    <div class="col-lg-6 m-auto">
        <div class="box-element text-center">
            <a class="btn btn-outline-dark" href="{% url 'ai_search' %}">&#x2190; Try Another Image</a>
            <hr>
            <h3>AI Analysis Complete!</h3>
            <p>Our model thinks this is a: <strong>{{ label }}</strong></p>
            <img class="img-fluid rounded" src="{{ image_url }}" style="max-height: 300px;">
            <hr>
            <a class="btn btn-success" href="{% url 'store' %}">Search Store for {{ label }}</a>
        </div>
    </div>
</div>
{% endblock content %}
